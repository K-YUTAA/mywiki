<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuuta Notes</title>
  <meta name="description" content="公開用のObsidianノート一覧">
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2a37;
      --muted: #5b6675;
      --accent: #1677ff;
      --line: rgba(31,42,55,0.12);
      --shadow: 0 16px 40px rgba(20, 28, 40, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1722;
        --card: #151f2c;
        --text: #e7edf5;
        --muted: #a7b3c2;
        --accent: #5aaeff;
        --line: rgba(231,237,245,0.12);
        --shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 85%, var(--card)));
      color: var(--text);
      line-height: 1.8;
    }
    main {
      width: min(920px, calc(100vw - 32px));
      margin: 56px auto 96px;
    }
    .hero {
      padding: 28px 4px 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }
    p.lead {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 54rem;
    }
    .section-title {
      margin: 28px 0 12px;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .grid {
      display: grid;
      gap: 18px;
    }
    .card {
      display: block;
      padding: 22px 24px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, border-color 0.18s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 32%, var(--line));
    }
    .meta {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .title {
      margin: 0 0 8px;
      font-size: 1.25rem;
      line-height: 1.35;
    }
    .desc {
      margin: 0;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Yuuta Notes</h1>
      <p class="lead">Obsidian で書いたノートを HTML として公開するためのトップページです。各記事は個別 URL で共有できます。</p>
    </section>

    <div class="section-title">Articles</div>
    <section class="grid">
      <a class="card" href="articles/20260404-article/">
        <div class="meta">2026-04-04 ・ AI / Interpretability</div>
        <h2 class="title">感情概念はモデルの選好をどう動かすのか</h2>
        <p class="desc">Anthropic の解釈可能性研究をもとに、感情概念が LLM の選好・逸脱行動・安全設計にどう効くかを整理した記事。</p>
      </a>
    </section>
  </main>
</body>
</html>
